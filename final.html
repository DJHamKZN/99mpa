<!DOCTYPE html><html class="light" lang="ru"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>99 MPa | Архитектурный бетон</title>
<style>
        body {
            background-color: #f9f9f9;
            color: #1a1c1c;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .grayscale-image {
            filter: grayscale(100%) contrast(1.1);
        }
        .reveal-overlay {
            background: linear-gradient(to bottom, rgba(249, 249, 249, 0.2), rgba(249, 249, 249, 0.9));
        }
        .structural-grid {
            background-image: linear-gradient(#d9d9d9 1px, transparent 1px), linear-gradient(90deg, #d9d9d9 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.1;
        }
    </style>
<link rel="stylesheet" href="assets/css/fonts.css">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="font-body-md">
<!-- TopNavBar -->

<main class="relative min-h-screen flex flex-col items-center justify-center">
<!-- Structural Background Layer -->
<div class="absolute inset-0 structural-grid pointer-events-none"></div>
<!-- HERO SECTION: Final Spread Concept -->
<section class="relative w-full min-h-[90vh] px-margin-page flex flex-col items-center justify-center overflow-hidden">
<!-- Large Main Image: Bolgar -->
<div class="relative w-full max-w-[1440px] aspect-[21/9] mb-12 group overflow-hidden border border-outline-variant">
<img alt="Bolgar architectural concrete structure" class="w-full h-full object-cover grayscale-image transform transition-transform duration-[2000ms] group-hover:scale-105" src="assets/img/2c0f3d98281b.png">
<div class="absolute inset-0 bg-black/5 mix-blend-overlay"></div>
</div>
<!-- Central Brand Identity -->
<div class="relative z-10 text-center max-w-4xl mx-auto space-y-8 animate-fade-in transition-all duration-1000 opacity-100">
<div class="flex flex-col items-center">
<h1 class="font-display-xl text-display-xl md:text-display-xl text-headline-lg-mobile tracking-tighter uppercase mb-4">
                        99 MPa
                    </h1>
<div class="w-12 h-px bg-primary mb-8"></div>
<p class="font-headline-lg text-headline-lg max-w-2xl mx-auto text-on-surface leading-tight">Создаем объекты, которые остаются на десятилетия.</p>
</div>
</div>
<!-- Technical Detail Ornament (Monograph Style) -->


</section>
<!-- Secondary Focused Content for Depth -->

</main>
<!-- Footer -->

<script>
        // Smooth reveal on scroll interaction
        document.addEventListener('DOMContentLoaded', () => {
            const observerOptions = {
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('opacity-100');
                        entry.target.classList.remove('opacity-0', 'translate-y-4');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.animate-fade-in').forEach(el => {
                el.classList.add('transition-all', 'duration-1000', 'opacity-0', 'translate-y-4');
                observer.observe(el);
            });

            // Header shrink effect
            window.addEventListener('scroll', () => {
                const header = document.querySelector('header');
                if (window.scrollY > 50) {
                    header.classList.add('h-16');
                    header.querySelector('div').classList.replace('h-20', 'h-16');
                } else {
                    header.classList.remove('h-16');
                    header.querySelector('div').classList.replace('h-16', 'h-20');
                }
            });
        });
    </script>


</body></html>
